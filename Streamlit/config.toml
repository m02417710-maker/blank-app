[theme]
base = "dark"
primaryColor = "#4a9eff"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1e1e1e"
textColor = "#fafafa"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
magicEnabled = false

[client]
showErrorDetails = true
toolbarMode = "minimal"
